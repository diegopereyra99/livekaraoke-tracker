<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Karaoke Tracker</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="shell">
      <button id="record">record</button>
      <p id="status">idle</p>
      <label class="config">
        <span>windows</span>
        <textarea id="windows">w1 1000 3000
w2 2000 6000</textarea>
      </label>
      <p class="hint">one window per line: `name period_ms length_ms`</p>
      <label class="config">
        <span>lyrics</span>
        <textarea id="lyrics" placeholder="paste lyrics here, one line per row"></textarea>
      </label>
      <label class="config inline">
        <span>matching</span>
        <select id="metric">
          <option value="jaro-winkler">jaro-winkler</option>
          <option value="levenshtein">levenshtein</option>
          <option value="dice">dice</option>
        </select>
      </label>
      <label class="config inline">
        <span>focus lines</span>
        <input id="focus-size" type="number" min="1" value="2" />
      </label>
      <label class="config inline">
        <span>future lines</span>
        <input id="future-size" type="number" min="0" value="2" />
      </label>
      <section id="focus-out" class="focus"></section>
      <section id="lyrics-out" class="lyrics"></section>
      <section id="windows-out" class="windows"></section>
    </main>
    <script type="module" src="/client.js"></script>
  </body>
  </html>
