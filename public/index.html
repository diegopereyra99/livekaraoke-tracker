<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Karaoke Tracker</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="shell">
      <button id="record">record</button>
      <p id="status">idle</p>
      <label class="config">
        <span>windows</span>
        <textarea id="windows">hook 1200 3200
verse 3500 9000</textarea>
      </label>
      <p class="hint">one window per line: `name period_ms length_ms`</p>
      <section id="windows-out" class="windows"></section>
    </main>
    <script type="module" src="/client.js"></script>
  </body>
  </html>
